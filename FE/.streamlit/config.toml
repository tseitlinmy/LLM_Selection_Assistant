# .streamlit/config.toml

[server]
enableStaticServing = true

[[theme.fontFaces]]
family = "varta"
url = "app/static/Varta-Regular.woff2"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "varta"
url = "app/static/Varta-Bold.woff2"
style = "normal"
weight = 700

# [[theme.fontFaces]]
# family = "varta"
