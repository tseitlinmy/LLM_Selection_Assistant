[theme]
base = "light"
backgroundColor = "#FDF9ED"
secondaryBackgroundColor = "#ffffff" # Background for input widgets, etc.
font = "varta, sans-serif"       # fallback to sans-serif if varta unavailable
# font = "Trebushet MS, Tahoma, Verdana, Arial, Helvetica, sans-serif"
baseFontSize = 18             # 18px
baseFontWeight = 400          # normal weight
textColor = "#222222"         # color: rgb(34, 34, 34)